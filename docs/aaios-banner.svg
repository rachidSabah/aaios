<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bg)" rx="12" />

  <!-- Top accent bar -->
  <rect x="0" y="0" width="800" height="4" fill="url(#accent)" rx="2" />

  <!-- Logo: stylized "AA" in a hexagon -->
  <g transform="translate(40, 50)">
    <polygon points="50,0 100,28 100,84 50,112 0,84 0,28" fill="none" stroke="url(#accent)" stroke-width="2.5" />
    <text x="50" y="72" font-family="monospace" font-size="42" font-weight="bold" fill="#60a5fa" text-anchor="middle">AA</text>
  </g>

  <!-- Title -->
  <text x="180" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="bold" fill="#fafafa">
    Agentic AI Operating System
  </text>

  <!-- Subtitle -->
  <text x="180" y="108" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#9ca3af">
    Windows-first · Modular · Capability-based · 13 LLM Providers · 16 Agent Types
  </text>

  <!-- Tags -->
  <g transform="translate(180, 130)">
    <!-- Apache 2.0 -->
    <rect x="0" y="0" width="90" height="24" rx="12" fill="#1e293b" stroke="#334155" />
    <text x="45" y="16" font-family="monospace" font-size="11" fill="#60a5fa" text-anchor="middle">Apache 2.0</text>

    <!-- Python 3.12 -->
    <rect x="100" y="0" width="100" height="24" rx="12" fill="#1e293b" stroke="#334155" />
    <text x="150" y="16" font-family="monospace" font-size="11" fill="#22c55e" text-anchor="middle">Python 3.12+</text>

    <!-- Next.js 16 -->
    <rect x="210" y="0" width="90" height="24" rx="12" fill="#1e293b" stroke="#334155" />
    <text x="255" y="16" font-family="monospace" font-size="11" fill="#fafafa" text-anchor="middle">Next.js 16</text>

    <!-- 597 tests -->
    <rect x="310" y="0" width="90" height="24" rx="12" fill="#1e293b" stroke="#334155" />
    <text x="355" y="16" font-family="monospace" font-size="11" fill="#f59e0b" text-anchor="middle">597 tests</text>

    <!-- v1.0.0 -->
    <rect x="410" y="0" width="70" height="24" rx="12" fill="#1e293b" stroke="#334155" />
    <text x="445" y="16" font-family="monospace" font-size="11" fill="#22c55e" text-anchor="middle">v1.0.0</text>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="196" width="800" height="4" fill="url(#accent)" rx="2" />

  <!-- Architecture layers (right side, subtle) -->
  <g transform="translate(620, 40)" opacity="0.3">
    <rect x="0" y="0" width="140" height="20" rx="4" fill="#334155" />
    <text x="70" y="14" font-family="monospace" font-size="9" fill="#9ca3af" text-anchor="middle">L5 Surfaces</text>
    <rect x="5" y="25" width="130" height="20" rx="4" fill="#334155" />
    <text x="70" y="39" font-family="monospace" font-size="9" fill="#9ca3af" text-anchor="middle">L4 Supervision</text>
    <rect x="10" y="50" width="120" height="20" rx="4" fill="#334155" />
    <text x="70" y="64" font-family="monospace" font-size="9" fill="#9ca3af" text-anchor="middle">L3 Agents</text>
    <rect x="15" y="75" width="110" height="20" rx="4" fill="#334155" />
    <text x="70" y="89" font-family="monospace" font-size="9" fill="#9ca3af" text-anchor="middle">L2 Services</text>
    <rect x="20" y="100" width="100" height="20" rx="4" fill="#334155" />
    <text x="70" y="114" font-family="monospace" font-size="9" fill="#9ca3af" text-anchor="middle">L1 Kernel</text>
  </g>
</svg>
