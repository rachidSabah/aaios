# ---------------------------------------------------------------------------
# Ruff — linter + formatter
# ---------------------------------------------------------------------------
[tool.ruff]
target-version = "py312"
line-length = 100
extend-exclude = [
  ".git",
  ".venv",
  "build",
  "dist",
  "node_modules",
  "surfaces/web",
  "docs",
]

[tool.ruff.lint]
# All rules enabled by default; opt out individually.
select = [
  "E", "F", "W",     # pycodestyle / pyflakes
  "I",                # isort
  "B",                # bugbear
  "C4",               # comprehensions
  "UP",               # pyupgrade
  "SIM",              # simplify
  "RUF",              # ruff-specific
  "PTH",              # use pathlib
  "ERA",              # eradicate (no commented-out code)
  "PL",               # pylint
  "S",                # bandit (security)
  "ASYNC",            # async linting
  "TCH",              # type-checking imports
  "PT",               # pytest style
  "C90",              # mccabe complexity
  "N",                # pep8-naming
  "D",                # pydocstyle
]
ignore = [
  "D100", "D104", "D105", "D107",   # missing docstrings for modules/packages/etc
  "S101",                            # assert (used in tests)
  "PLR0913",                         # too many args (we'll allow)
  "E501",                            # line length handled by formatter
  "PLW0603",                         # global statement — acceptable for module-level singletons
  "PLC0415",                         # import inside function — sometimes needed for lazy loading
  "TC001", "TC002", "TC003",         # move imports to TYPE_CHECKING — premature optimization for our use
  "SIM102",                          # nested if — readable as-is
  "SIM112",                          # os.environ case — we use UPPER_CASE already
  "D301",                            # use raw string for backslashes — docstrings, would break formatting
  "ASYNC240",                        # async sleep in finally — known pattern, false positive
  "S701",                            # jinja2 autoescape=False — prompts are not HTML
  "S108",                            # /tmp usage — we use it intentionally
  "PLR2004",                         # magic values — we'll allow in well-named contexts
  "SIM105",                          # contextlib.suppress — readable as try/except/pass
  "RUF006",                          # asyncio.create_task fire-and-forget — intentional
  "PLW2901",                         # for-loop variable overwritten — readable as-is
  "PLR0911",                         # too many return statements — acceptable in helpers
  "PLW0108",                         # unnecessary lambda — readable as-is in tests
  "B017",                            # blind exception in pytest.raises — tests can be broad
  "PT011",                           # pytest.raises without match — tests can be broad
  "PT012",                           # pytest.raises multi-statement — tests can be multi-line
  "RUF043",                          # regex pattern in match — tests can be loose
  "RUF100",                          # unused noqa — ruff version churn, will fix incrementally
  "RUF005",                          # list concatenation — readable as-is
  "RUF012",                          # mutable class attr default — fine for our test fixtures
  "RUF022",                          # __all__ not sorted — we keep logical grouping
  "SIM103",                          # return negated condition — readable as-is
  "UP041",                           # asyncio.TimeoutError → TimeoutError — both valid
  "PLR1711",                         # useless return at end — explicit is fine
  "D205",                            # blank line after summary — overly strict for our docstrings
  "D415",                            # first line must end with punctuation — overly strict
  "F821",                            # undefined name in Protocol stubs — false positive for Any in Protocol method signatures
  "D102",                            # missing docstring in public method — Protocol stubs don't need them
  "SIM110",                          # use all() instead of for loop — readable as-is
  "N806",                            # variable in function should be lowercase — WHITE/GRAY/BLACK are conventional
  "ERA001",                          # commented-out code — false positive on section dividers (---)
  "D417",                            # missing arg descriptions in docstring — example plugins are illustrative
  "PTH123",                          # open() vs Path.open() — fine for key file reads
  "SIM108",                          # ternary operator — if/else is more readable
  "S105",                            # hardcoded password — false positive on StrEnum values
  "C901",                            # function too complex — acceptable for FastAPI factory
  "PLR0915",                         # too many statements — acceptable for FastAPI factory
  "S110",                            # try-except-pass — acceptable for config loading fallbacks
  "B007",                            # loop variable not used — acceptable for dict iteration
  "PLW1510",                         # subprocess.run without check=False — we handle return codes manually
  "PTH109",                          # os.getcwd() vs Path.cwd() — fine for script convenience
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S", "D", "PLR2004", "PLR0912"]            # tests can use asserts, magic values, branches
"scripts/**" = ["S", "D", "PLR0912", "C901"]  # audit scripts: complex analysis
"surfaces/web/**" = []
"surfaces/cli/**" = ["B008", "PLR0912"]                   # typer.Option in defaults is the standard pattern
"services/execution/handlers.py" = ["PLR0912", "S310", "ASYNC210", "ASYNC230"]  # git branches, urllib, file I/O
"services/execution/manager.py" = ["E741"]     # log variable l
"services/execution/audit_store.py" = ["S608"]  # SQL is parameterized, f-string is safe
"services/cognitive/**" = ["E701", "D101"]  # one-liners + dataclass docstrings
"services/knowledge/**" = ["PLR0912", "E701", "D101", "E741", "SIM101"]  # search branches, one-liners, variable l
"services/engineering/**" = ["PLR0912", "E701", "D101"]  # analysis branches
"surfaces/api/**" = ["B008", "PLR0912", "E741"]  # Body() in defaults, analysis branches
"services/installer/**" = ["S603", "S607", "PLR0912"]  # subprocess for env detection
"services/runtime_discovery/**" = ["S603", "S607", "PLR0912"]  # subprocess for discovery, multi-source branches
"services/brain/**" = ["S603", "S607"]  # nvidia-smi for GPU detection
"services/execution_engine/**" = ["D101", "D103", "S603", "S607", "S602", "E701", "PLR0912", "B027", "ASYNC221"]  # adapters spawn processes
"services/desktop/**" = ["D101", "D103", "S603", "S607", "S112", "S324", "E701"]  # desktop automation
"core/contracts/execution_engine.py" = ["D101"]  # enum definitions
"surfaces/desktop/**" = ["D101", "D103", "F401"]  # desktop surface
"scripts/start.py" = ["S603", "S607", "ASYNC230"]  # startup script

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.mccabe]
max-complexity = 12

[tool.ruff.lint.isort]
known-first-party = ["core", "services", "agents", "supervisor", "orchestrator", "surfaces"]

# ---------------------------------------------------------------------------
# Mypy — strict typing
# ---------------------------------------------------------------------------
[tool.mypy]
python_version = "3.12"
strict = true
warn_unreachable = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_return_any = true
no_implicit_optional = true
no_implicit_reexport = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
disallow_untyped_decorators = true
check_untyped_defs = true
show_error_codes = true
namespace_packages = true
explicit_package_bases = true
mypy_path = [
  ".",
]
files = [
  "core",
  "services",
  "agents",
  "supervisor",
  "orchestrator",
  "surfaces/api",
  "surfaces/cli",
]

[[tool.mypy.overrides]]
module = ["pywinauto.*", "pyautogui.*", "win32api", "win32con", "win32service", "win32serviceutil", "win32event", "win32job", "win32security", "ntsecuritycon", "pythoncom", "pywintypes", "networkx.*", "playwright.*", "boto3.*", "azure.*", "google.cloud.*", "docx.*", "reportlab.*", "openpyxl.*"]
ignore_missing_imports = true

# Phase 4 service packages — relax strict mode. These packages were introduced
# in Phase 4 Milestones 1-3 (brain, execution_engine, runtime_discovery,
# installer, desktop, etc.) and use patterns (late imports, subprocess,
# Any-typed callbacks, global singletons) that conflict with --strict.
# Full strict typing will be restored in Phase 5 hardening.
[[tool.mypy.overrides]]
module = [
  "services.runtime_discovery.*",
  "services.brain.*",
  "services.execution_engine.*",
  "services.installer.*",
  "services.desktop.*",
  "services.monitoring.*",
  "services.self_healing.*",
  "services.plugin.*",
  "services.provider_validation.*",
  "services.validator.*",
  "services.doctor.*",
  "services.backup.*",
  "services.cleanup.*",
  "services.uninstall.*",
  "services.reset.*",
  "services.packaging.*",
  "services.certify.*",
  "services.benchmark.*",
  "services.mcp.*",
  "services.dashboard.*",
  "services.organization.*",
  "services.research.*",
  "services.security.*",
]
ignore_errors = true