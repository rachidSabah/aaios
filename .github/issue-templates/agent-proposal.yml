## Implementation plan

<!-- If you're planning to implement this yourself, sketch the file
     structure under agents/_impls/<your-agent-name>/. -->

```
agents/_impls/<name>/
├─ __init__.py
├─ agent.py          # implements GenericAgent
├─ capabilities.py   # CapabilityManifest
├─ bridge.py         # if subprocess bridge
└─ tests/
```

## Alignment check

- [ ] This agent will be referenced by name ONLY inside its own package (`agents/_impls/<name>/`)
- [ ] No code in `core/`, `services/`, `supervisor/`, `orchestrator/`, `surfaces/` will import or reference this agent by name
- [ ] The agent will satisfy the 11-method `GenericAgent` interface
- [ ] The agent will be installable as a plugin (separate repo) OR as a built-in (PR to `agents/_impls/`)
