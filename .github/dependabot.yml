# Dependabot — dependency updates
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2

updates:
  # Python dependencies (pyproject.toml)
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 5
    labels: [dependencies, python]
    reviewers: [rachidSabah]
    commit-message:
      prefix: chore(deps)
      include: scope
    groups:
      # Group minor + patch updates together to reduce PR noise
      python-minor:
        update-types:
          - minor
          - patch

  # Node dependencies (surfaces/web/package.json)
  - package-ecosystem: npm
    directory: /surfaces/web
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 5
    labels: [dependencies, javascript]
    reviewers: [rachidSabah]
    commit-message:
      prefix: chore(deps)
      include: scope
    groups:
      npm-minor:
        update-types:
          - minor
          - patch

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 5
    labels: [dependencies, ci]
    reviewers: [rachidSabah]
    commit-message:
      prefix: chore(ci)
      include: scope
