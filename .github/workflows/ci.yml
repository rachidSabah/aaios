# CI configuration
# https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions
#
# This workflow runs on every push to main and on every PR. It uses a
# Windows + Linux matrix to enforce the Windows-first principle (INV-12):
# every feature must work on Windows 11 first, and must not break Linux
# (Linux is a v1.1 goal but the abstraction layer is in place from Phase 3).
#
# Matrix strategy:
#   - windows-latest = Windows Server 2022 (closest CI image to Windows 11)
#   - ubuntu-latest  = Ubuntu 24.04
#
# All checks must pass on BOTH OSes for a PR to merge.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs for the same ref when a new run starts.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Python checks (ruff, mypy, bandit, pytest, pip-audit)
  # ---------------------------------------------------------------------------
  python:
    name: Python (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        python-version: ['3.12', '3.13']

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # Install with dev extras; pick OS-specific extras
          if [ "$RUNNER_OS" = "Windows" ]; then
            pip install -e ".[dev,windows]"
          else
            pip install -e ".[dev,linux]"
          fi
          pip install ruff mypy bandit pip-audit

      - name: Ruff (lint + format check)
        run: ruff check --output-format=github .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy (strict)
        run: mypy

      - name: Bandit (security)
        run: bandit -c pyproject.toml -r core services agents supervisor orchestrator surfaces/api surfaces/cli

      - name: Pytest (offline mode)
        run: pytest -m "offline or not offline" --cov-report=term-missing --cov-report=xml

      - name: pip-audit
        run: pip-audit --strict --desc

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/coverage.xml
          fail_ci_if_error: false

  # ---------------------------------------------------------------------------
  # Web (Next.js) checks — Linux only (Node is portable)
  # ---------------------------------------------------------------------------
  web:
    name: Web (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: surfaces/web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        # Don't specify version here — let it read from package.json's
        # packageManager field (pnpm@9.10.0) to avoid version mismatch.

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Vitest
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_API_BASE: http://127.0.0.1:8000

  # ---------------------------------------------------------------------------
  # Architecture invariants — INV-09 enforcement (no agent names in core)
  # ---------------------------------------------------------------------------
  invariants:
    name: Architecture invariants
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: INV-09 — no agent implementation names in core/services/supervisor/orchestrator/surfaces
        run: |
          set -e
          # INV-09: code outside agents/_impls/<name>/ must not reference
          # specific agent implementations by name.
          #
          # The banned list is the set of known agent product names. New
          # agents added in the future should be added here.
          BANNED='\bclaude\b|\bhermes\b|\bopenhands\b|\bcline\b|\broocode\b|\broo_code\b|\bgemini_cli\b|\bcodex_cli\b'
          # Match case-insensitively as whole words. Exclude:
          #   - docs/  (docs can reference products)
          #   - agents/_impls/  (the implementations themselves)
          #   - .github/  (issue templates mention products as examples)
          #   - CHANGELOG.md / README.md  (may mention products)
          #   - *.md files anywhere  (architecture docs reference products)
          #   - tests/  (tests may use product names in fixtures)
          #   - comments (// and #) — TODO: a more refined check
          #   - services/runtime_discovery/  (specs reference agent names by design)
          #   - services/brain/  (constellation references agent names)
          #   - services/execution_engine/  (adapters reference agent names by design)
          #   - services/installer/  (discovers agents by name)
          #   - core/contracts/execution_engine.py  (enum defines agent types)
          #   - services/model_router/  (provider implementations reference model names)
          #   - services/provider_validation/  (validator references model names)
          #   - core/contracts/model/  (model contracts reference model names)
          offending=$( \
            grep -rEni "$BANNED" \
              --include='*.py' \
              core services supervisor orchestrator surfaces/api surfaces/cli \
            | grep -v 'agents/_impls/' \
            | grep -v 'services/runtime_discovery/' \
            | grep -v 'services/brain/' \
            | grep -v 'services/execution_engine/' \
            | grep -v 'services/installer/' \
            | grep -v 'core/contracts/execution_engine.py' \
            | grep -v 'services/model_router/' \
            | grep -v 'services/provider_validation/' \
            | grep -v 'core/contracts/model/' \
            | grep -v '^\s*#' \
            || true \
          )
          if [ -n "$offending" ]; then
            echo "INV-09 violation: agent implementation name found in core code:"
            echo "$offending"
            echo ""
            echo "The core must be implementation-agnostic. See"
            echo "docs/architecture/02-generic-agent-runtime.md §7."
            exit 1
          fi
          echo "INV-09: OK — no agent implementation names in core code."

      - name: INV-02 — no I/O imports outside core/gateway/
        run: |
          set -e
          # INV-02: only core/gateway/ may import subprocess, os.open (in
          # specific forms), socket, httpx, requests, urllib.request.
          #
          # Exemptions: system-level services that legitimately need subprocess:
          #   - services/installer/ (detects and installs dependencies)
          #   - services/runtime_discovery/ (discovers AI agents via package managers)
          #   - services/brain/ (GPU detection via nvidia-smi)
          #   - services/execution_engine/ (spawns agent processes)
          #   - services/doctor/, backup/, cleanup/, uninstall/, validator/,
          #     self_healing/, monitoring/, benchmark/, certify/, reset/, packaging/
          #   - surfaces/cli/ (CLI legitimately spawns processes)
          BANNED_IMPORTS='^import (subprocess|socket|httpx|requests)|^from (subprocess|socket|httpx|requests|urllib\.request)'
          offending=$( \
            grep -rEn "$BANNED_IMPORTS" \
              --include='*.py' \
              core services agents supervisor orchestrator surfaces/api surfaces/cli \
            | grep -v '^core/gateway/' \
            | grep -v 'services/installer/' \
            | grep -v 'services/runtime_discovery/' \
            | grep -v 'services/brain/' \
            | grep -v 'services/execution_engine/' \
            | grep -v 'services/doctor/' \
            | grep -v 'services/backup/' \
            | grep -v 'services/cleanup/' \
            | grep -v 'services/uninstall/' \
            | grep -v 'services/validator/' \
            | grep -v 'services/self_healing/' \
            | grep -v 'services/monitoring/' \
            | grep -v 'services/benchmark/' \
            | grep -v 'services/certify/' \
            | grep -v 'services/reset/' \
            | grep -v 'services/packaging/' \
            | grep -v 'services/model_router/' \
            | grep -v 'services/update/' \
            | grep -v 'services/desktop/' \
            | grep -v 'surfaces/cli/' \
            | grep -v '/tests/' \
            || true \
          )
          if [ -n "$offending" ]; then
            echo "INV-02 violation: I/O import found outside core/gateway/:"
            echo "$offending"
            echo ""
            echo "All I/O must go through core/gateway/. See"
            echo "docs/architecture/03-system-design.md §2.9."
            exit 1
          fi
          echo "INV-02: OK — no I/O imports outside core/gateway/."

  # ---------------------------------------------------------------------------
  # Required: all jobs must pass for PR merge
  # ---------------------------------------------------------------------------
  required:
    name: All checks required
    runs-on: ubuntu-latest
    needs: [python, web, invariants]
    if: always()
    steps:
      - name: Check all jobs passed
        if: ${{ needs.python.result != 'success' || needs.web.result != 'success' || needs.invariants.result != 'success' }}
        run: |
          echo "One or more required jobs failed."
          echo "  python: ${{ needs.python.result }}"
          echo "  web: ${{ needs.web.result }}"
          echo "  invariants: ${{ needs.invariants.result }}"
          exit 1
      - name: All required jobs passed
        run: echo "All required jobs passed."
