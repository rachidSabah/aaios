# Release workflow
# https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions
#
# Triggers on push to main with conventional-commit messages. Uses
# semantic-release to compute the next version, generate the changelog
# entry, build artifacts (Windows installer, Docker images), and publish
# a GitHub Release.
#
# This is a Phase 2 skeleton. The full implementation lands in Phase 14.

name: Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type (patch | minor | major)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - patch
          - minor
          - major

permissions:
  contents: write
  packages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Determine if a release should be cut (only on conventional commits)
  # ---------------------------------------------------------------------------
  should-release:
    name: Should release?
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.semantic.outputs.new_release_published }}
      version: ${{ steps.semantic.outputs.new_release_version }}
      tag: ${{ steps.semantic.outputs.new_release_git_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Semantic release (dry-run first)
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          dry_run: true
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
            conventional-changelog-conventionalcommits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Build artifacts (Windows installer + optional Docker images)
  # ---------------------------------------------------------------------------
  build:
    name: Build artifacts
    needs: should-release
    if: needs.should-release.outputs.released == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: aaios-windows-installer
            file: dist/AAiOS-Setup.exe
          - os: ubuntu-latest
            artifact: aaios-python-wheel
            file: dist/*.whl

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build Python wheel (both OSes)
        run: |
          python -m pip install --upgrade pip hatch
          hatch build

      - name: Build Windows installer (Windows only)
        if: matrix.os == 'windows-latest'
        run: |
          # Phase 2 stub: the actual Inno Setup compile lands in Phase 14.
          # For now, just verify the .iss file is present.
          test -f deploy/windows/aaios.iss || exit 1
          echo "Inno Setup compile will run here in Phase 14."

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.file }}
          if-no-files-found: warn
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Build and push Docker images (optional deployment path)
  # ---------------------------------------------------------------------------
  docker:
    name: Docker images
    needs: should-release
    if: needs.should-release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/aaios-runtime
            ghcr.io/${{ github.repository_owner }}/aaios-web
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      # Phase 2 stub: the Dockerfiles will be filled out in Phase 14.
      # For now, skip the build if Dockerfile is the placeholder.
      - name: Build and push (Phase 14)
        run: |
          echo "Docker build will run here in Phase 14."
          echo "Tags: ${{ steps.meta.outputs.tags }}"

  # ---------------------------------------------------------------------------
  # Publish the GitHub Release
  # ---------------------------------------------------------------------------
  publish:
    name: Publish release
    needs: [should-release, build, docker]
    if: needs.should-release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Semantic release (publish)
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
            conventional-changelog-conventionalcommits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attach artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/aaios-windows-installer/*
            artifacts/aaios-python-wheel/*
          draft: true
          generate_release_notes: true
